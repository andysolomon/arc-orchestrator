name: Merge Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: read

jobs:
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            build
            chore
            ci
            docs
            style
            refactor
            perf
            test

      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: andysolomon/arc-board
          path: .vendor/arc-board
          sparse-checkout: |
            arc-story-queue/packages/arc-contracts

      - uses: oven-sh/setup-bun@v2

      - name: Link arc-contracts
        run: |
          cd .vendor/arc-board/arc-story-queue/packages/arc-contracts
          bun link
          cd "$GITHUB_WORKSPACE"
          bun link arc-contracts

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
